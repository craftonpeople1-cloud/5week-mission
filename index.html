var current=0,total=CARDS.length,isAnimating=false,isPaused=false,autoTimer=null;

function getConfig(o){
  var m={
    "-3":{tx:-320,tz:-280,scale:.60,ry:40, opa:0,   br:.3},
    "-2":{tx:-240,tz:-160,scale:.70,ry:28, opa:.18, br:.42},
    "-1":{tx:-148,tz:-72, scale:.82,ry:18, opa:.58, br:.62},
    "0": {tx:0,   tz:0,   scale:1,  ry:0,  opa:1,   br:1},
    "1": {tx:148, tz:-72, scale:.82,ry:-18,opa:.58, br:.62},
    "2": {tx:240, tz:-160,scale:.70,ry:-28,opa:.18, br:.42},
    "3": {tx:320, tz:-280,scale:.60,ry:-40,opa:0,   br:.3}
  };
  return m[String(Math.max(-3,Math.min(3,o)))];
}

function apply(el,c,tr){
  el.style.transition=tr;
  el.style.transform="translateX(calc(-50% + "+c.tx+"px)) translateZ("+c.tz+"px) scale("+c.scale+") rotateY("+c.ry+"deg)";
  el.style.opacity=c.opa;
  el.style.filter="brightness("+c.br+")";
  el.style.zIndex=Math.round((1-Math.abs(c.ry)/50)*10);
  el.style.boxShadow=c.ry===0?"0 40px 100px rgba(0,0,0,0.8)":"none";
}

function buildCard(idx,offset){
  var card=CARDS[idx],cfg=getConfig(offset),el=document.createElement("div");
  el.className="card";el.dataset.offset=offset;el.style.background=card.bg;
  el.innerHTML=
    '<div class="card-img" style="background:'+card.bg+';">'+
      '<img class="char-img" src="'+card.img+'" alt="'+card.country+'"/>'+
      '<div class="card-flag"><img src="'+card.flag+'" alt="flag"/></div>'+
    '</div>'+
    '<div class="card-body" style="background:'+card.bg+';">'+
      '<div class="card-country" style="color:'+card.tagColor+';">'+card.country+'</div>'+
      '<div class="card-city">'+card.city+'</div>'+
      '<div class="card-concept">'+card.concept+'</div>'+
      '<span class="card-tag" style="color:'+card.tagColor+';background:'+card.tagBg+';">'+card.tag+'</span>'+
    '</div>';
  apply(el,cfg,"none");
  if(offset!==0)(function(o){el.addEventListener("click",function(){move(o);pauseAuto();});})(offset);
  else el.addEventListener("click",function(){pauseAuto();});
  return el;
}

function render(){
  var stage=document.getElementById("stage");
  stage.innerHTML="";
  for(var i=-3;i<=3;i++){
    var idx=((current+i)%total+total)%total;
    stage.appendChild(buildCard(idx,i));
  }
  renderDots();
}

function move(dir){
  if(isAnimating)return;
  isAnimating=true;
  var tr="transform 0.62s cubic-bezier(0.25,0.46,0.45,0.94),opacity 0.5s ease,filter 0.5s ease";
  document.querySelectorAll(".card").forEach(function(el){
    var o=parseInt(el.dataset.offset)-dir;
    el.dataset.offset=o;
    apply(el,getConfig(o),tr);
  });
  current=((current+dir)%total+total)%total;
  renderDots();
  setTimeout(function(){isAnimating=false;render();},660);
}

function renderDots(){
  var d=document.getElementById("dots");d.innerHTML="";
  for(var i=0;i<total;i++){
    var dot=document.createElement("div");
    dot.className="dot"+(i===current?" active":"");
    (function(idx){dot.addEventListener("click",function(){current=idx;render();pauseAuto();});})(i);
    d.appendChild(dot);
  }
}

function startAuto(){
  clearInterval(autoTimer);
  autoTimer=setInterval(function(){if(!isPaused)move(1);},3200);
  document.getElementById("auto-label").textContent="자동 재생 중 · 카드를 클릭하면 멈춰요";
}

function pauseAuto(){
  isPaused=true;
  document.getElementById("auto-label").textContent="수동 모드 · 화살표로 넘겨보세요";
  clearTimeout(window._rt);
  window._rt=setTimeout(function(){isPaused=false;document.getElementById("auto-label").textContent="자동 재생 중 · 카드를 클릭하면 멈춰요";},7000);
}

document.addEventListener("keydown",function(e){if(e.key==="ArrowLeft"){move(-1);pauseAuto();}if(e.key==="ArrowRight"){move(1);pauseAuto();}});
var _sx=0;
document.addEventListener("touchstart",function(e){_sx=e.touches[0].clientX;},{passive:true});
document.addEventListener("touchend",function(e){var d=_sx-e.changedTouches[0].clientX;if(Math.abs(d)>40){move(d>0?1:-1);pauseAuto();}});
render();startAuto();
</script>
